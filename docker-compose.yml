# IAMS Local Development — Docker Compose
#
# 3 services: api-gateway, redis, mediamtx
#
# Usage:
#   ./scripts/dev-up.sh          # auto-detect IP, build, start
#   docker compose up --build -d # manual start
#   docker compose logs -f       # tail all logs
#   docker compose down          # stop

services:
  # ── Core Application ─────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iams-api-gateway
    env_file:
      - ./backend/.env
    environment:
      - SERVICE_ROLE=api-gateway
      - REDIS_URL=redis://redis:6379/0
      - MEDIAMTX_EXTERNAL=true
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_WEBRTC_URL=http://mediamtx:8889
      - MEDIAMTX_RTSP_URL=rtsp://mediamtx:8554
      - EDGE_API_KEY=iams-edge-key-2026-prod
    volumes:
      - ./backend:/app
      - faiss_data:/app/data/faiss
      - face_uploads:/app/data/uploads/faces
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --reload --reload-dir /app/app
    depends_on:
      mediamtx:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Infrastructure ───────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: iams-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: iams-mediamtx
    volumes:
      - ./deploy/mediamtx.dev.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"      # RTSP ingest from RPi
      - "8887:8887/udp"  # WebRTC media UDP
      - "8889:8889"      # WHEP endpoint
    restart: unless-stopped

volumes:
  faiss_data:
  face_uploads:
