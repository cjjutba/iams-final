# Ruff linting configuration for IAMS edge device
target-version = "py311"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
]
ignore = [
    "E501",   # line too long (handled by formatter)
]

[format]
quote-style = "double"
indent-style = "space"
