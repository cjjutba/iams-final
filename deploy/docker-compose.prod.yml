# IAMS Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iams-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    volumes:
      # Persist FAISS index and uploaded face images across restarts
      - faiss_data:/app/data/faiss
      - face_uploads:/app/data/uploads/faces
      - app_logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mediamtx:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # InsightFace model takes time to load

  redis:
    image: redis:7-alpine
    container_name: iams-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: iams-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      # RTSP ingest from RPi edge devices (over internet)
      - "8554:8554"
      # WebRTC media UDP (ICE candidates point here)
      - "8887:8887/udp"
    # API (9997) and WHEP (8889) are internal only — accessed
    # by backend and nginx via Docker network, not exposed to host.
    # No healthcheck: mediamtx image is scratch-based (no shell/wget/curl).
    # Backend's mediamtx_service.start() polls the API on startup instead.

  # TURN relay server — ensures WebRTC connectivity when mobile phones
  # are behind symmetric NATs (where STUN alone fails).
  coturn:
    image: coturn/coturn:latest
    container_name: iams-coturn
    restart: unless-stopped
    network_mode: host
    command:
      - "--listening-port=3478"
      - "--external-ip=167.71.217.44"
      - "--relay-ip=167.71.217.44"
      - "--min-port=49152"
      - "--max-port=49252"
      - "--user=iams:iams-turn-secret-2026"
      - "--realm=iams.local"
      - "--lt-cred-mech"
      - "--fingerprint"
      - "--no-cli"
      - "--no-tls"
      - "--no-dtls"
      - "--log-file=stdout"

  nginx:
    image: nginx:alpine
    container_name: iams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      mediamtx:
        condition: service_started

  # Certbot for free HTTPS certificates (run once, then renew via cron)
  certbot:
    image: certbot/certbot
    container_name: iams-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  faiss_data:
  face_uploads:
  app_logs:
  redis_data:
  certbot_certs:
  certbot_www:
