# IAMS Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iams-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    volumes:
      # Persist FAISS index and uploaded face images across restarts
      - faiss_data:/app/data/faiss
      - face_uploads:/app/data/uploads/faces
      - app_logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # InsightFace model takes time to load

  nginx:
    image: nginx:alpine
    container_name: iams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy

  # Certbot for free HTTPS certificates (run once, then renew via cron)
  certbot:
    image: certbot/certbot
    container_name: iams-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  faiss_data:
  face_uploads:
  app_logs:
  certbot_certs:
  certbot_www:
