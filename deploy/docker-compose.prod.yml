# IAMS Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# 7 services: postgres, redis, mediamtx, coturn, api-gateway, dozzle, nginx

services:
  # ── Database ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: iams-postgres
    environment:
      POSTGRES_DB: iams
      POSTGRES_USER: iams
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iams_prod_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iams -d iams"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Core Application ─────────────────────────────────────────────────

  api-gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iams-api-gateway
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    environment:
      - SERVICE_ROLE=api-gateway
      - DATABASE_URL=postgresql://iams:${POSTGRES_PASSWORD:-iams_prod_password}@postgres:5432/iams
      - EDGE_API_KEY=iams-edge-key-2026-prod
      - REDIS_URL=redis://redis:6379/0
      - MEDIAMTX_EXTERNAL=true
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_WEBRTC_URL=http://mediamtx:8889
      - MEDIAMTX_RTSP_URL=rtsp://mediamtx:8554
      - ADMIN_URL=https://iams.vercel.app
    volumes:
      - faiss_data:/app/data/faiss
      - face_uploads:/app/data/uploads/faces
      - app_logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mediamtx:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.0"

  # ── Infrastructure ───────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: iams-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: iams-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"      # RTSP ingest from RPi
      - "8887:8887/udp"  # WebRTC media UDP
      - "8889:8889"      # WHEP endpoint
    deploy:
      resources:
        limits:
          memory: 256M

  coturn:
    image: coturn/coturn:latest
    container_name: iams-coturn
    restart: unless-stopped
    command: >
      -n
      --realm=iams
      --fingerprint
      --listening-port=3478
      --min-port=49152
      --max-port=49252
      --user=iams:iams-turn-secret
      --lt-cred-mech
      --no-tls
      --no-dtls
      --log-file=stdout
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49252:49152-49252/udp"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Monitoring ──────────────────────────────────────────────────────

  dozzle:
    image: amir20/dozzle:latest
    container_name: iams-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Reverse Proxy ────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: iams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      mediamtx:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  faiss_data:
  face_uploads:
  app_logs:
  certbot_certs:
  certbot_www:
