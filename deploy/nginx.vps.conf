# IAMS VPS Nginx — thin API + video relay (post 2026-04-22 two-app split)
#
# Used by deploy/docker-compose.vps.yml. Serves:
#   - /api/              → api-gateway:8000 (auth, schedules, rooms, users, health)
#   - /api/v1/ws/        → api-gateway:8000 (only serves if ENABLE_WS_ROUTES=true,
#                          which it isn't on VPS; kept here for future flexibility)
#   - /iams.apk          → /static/iams.apk (student + faculty APK downloads)
#   - /health            → 200 OK (monitoring; different from /api/v1/health)
#   - /.well-known/      → Let's Encrypt challenge path
#   - /                  → small "this is IAMS public" landing text
#
# WebRTC WHEP traffic (port 8889) bypasses nginx — the Faculty APK hits
# mediamtx directly at http://167.71.217.44:8889/<stream>/whep. Adding a
# WHEP proxy here doesn't help (the actual media flows UDP peer-to-peer via
# coturn, not through nginx).

# Rate limit for /api (higher than the legacy full stack since there's way
# less to attack — just login + schedule read).
limit_req_zone $binary_remote_addr zone=vps_api:10m rate=30r/s;

upstream iams_backend_vps {
    server api-gateway:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 5M;
    large_client_header_buffers 8 64k;

    # ── Let's Encrypt challenge ─────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── WebSocket endpoints (must precede /api/) ────────────────────────
    # WS routes are disabled on VPS (ENABLE_WS_ROUTES=false) so these will
    # 404, but proxying them cleanly is cheap and keeps the config reusable
    # if the VPS profile ever gets broader.

    location /api/v1/ws/ {
        proxy_pass http://iams_backend_vps;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=vps_api burst=60 nodelay;

        proxy_pass http://iams_backend_vps;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Auth + schedule reads are sub-100ms. 30s is plenty.
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Android APK download ────────────────────────────────────────────
    # Mount deploy/static/iams-*.apk into /static on the host. Multiple APKs
    # coexist now (student + faculty):
    location = /iams-student.apk {
        alias /static/iams-student.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="iams-student.apk"';
    }
    location = /iams-faculty.apk {
        alias /static/iams-faculty.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="iams-faculty.apk"';
    }
    # Legacy single-APK path preserved for existing QR codes / download links.
    # Points at the faculty APK since that's the one most likely to be
    # installed from off-campus via the public VPS.
    location = /iams.apk {
        alias /static/iams-faculty.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="iams-faculty.apk"';
    }

    # ── Simple external healthcheck ─────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Landing page ────────────────────────────────────────────────────
    location = / {
        return 200 "IAMS public API + stream relay.\n\nMobile APIs:  /api/v1/auth/login, /api/v1/schedules/me, /api/v1/rooms/{id}\nLive streams: http://167.71.217.44:8889/<stream>/whep  (public WebRTC WHEP)\nFaculty APK:  /iams-faculty.apk\nStudent APK:  /iams-student.apk  (on-campus-only — needs IAMS-Net)\nAdmin portal: on the on-prem Mac (school LAN only).\n";
        add_header Content-Type text/plain;
    }

    # Everything else = 404.
    location / {
        return 404;
    }
}
