# IAMS VPS — Relay-only Docker Compose (post local-compute split)
#
# After the feat/local-compute-split cutover, the VPS no longer runs the
# backend / postgres / redis. Its only job is to be a PUBLIC RELAY for the
# video stream: it receives an outbound RTSP push from the on-prem Mac
# (runOnReady in deploy/mediamtx.onprem.yml) and serves WebRTC WHEP to
# off-campus viewers (mobile app, or any WHEP player).
#
# Usage:
#   rsync -avz ... deploy/docker-compose.relay.yml root@VPS:/opt/iams/deploy/
#   ssh root@VPS 'cd /opt/iams/deploy && docker compose -f docker-compose.relay.yml up -d'
#
# Or via the updated deploy.sh:
#   bash deploy/deploy.sh relay

services:
  # ── Media Relay (accepts push from Mac, serves WebRTC to world) ─────

  mediamtx:
    image: bluenviron/mediamtx:1.11.3
    container_name: iams-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.relay.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"      # RTSP ingest from the on-prem Mac's runOnReady push
      - "8887:8887/udp"  # WebRTC media UDP
      - "8889:8889"      # WHEP endpoint — consumed by the Android app's faculty live feed
    deploy:
      resources:
        limits:
          memory: 256M

  # ── TURN (WebRTC NAT traversal for off-campus viewers) ──────────────

  coturn:
    image: coturn/coturn:4.6.2-r1
    container_name: iams-coturn
    restart: unless-stopped
    command:
      - "-n"
      - "--realm=iams"
      - "--fingerprint"
      - "--listening-port=3478"
      - "--min-port=49152"
      - "--max-port=49252"
      - "--user=iams:iams-turn-secret-2026"
      - "--lt-cred-mech"
      - "--no-tls"
      - "--no-dtls"
      - "--log-file=stdout"
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49252:49152-49252/udp"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Reverse proxy (serves /iams.apk + /health; no /api/) ────────────

  nginx:
    image: nginx:alpine
    container_name: iams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.relay.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/static:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      mediamtx:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Log viewer ──────────────────────────────────────────────────────

  dozzle:
    image: amir20/dozzle:latest
    container_name: iams-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  certbot_certs:
  certbot_www:
