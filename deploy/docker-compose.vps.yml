# IAMS VPS — Thin API + Video Relay Docker Compose (post 2026-04-22 two-app split)
#
# This is the new DEFAULT production-VPS stack.
#
# The VPS is no longer a full backend — it's a thin three-job server:
#   1. Serve faculty auth + schedule + rooms API to the Faculty Android APK.
#   2. Receive an outbound RTSP push from the on-prem Mac (mediamtx
#      `runOnReady` ffmpeg; see deploy/mediamtx.onprem.yml) and re-serve it
#      as public WebRTC WHEP at http://167.71.217.44:8889/<stream>/whep.
#   3. Provide coturn for WebRTC NAT traversal (faculty phones on cellular).
#
# No ML, no FAISS, no Redis, no face embeddings, no student data — the
# backend image is reused but the `ENABLE_*` flags in backend/.env.vps
# disable every heavy feature. See backend/.env.vps.example.
#
# Alternative stacks on the VPS (mutually exclusive — share ports 80/8554):
#   - deploy/docker-compose.relay.yml : video-only, no API (thesis fallback)
#   - deploy/docker-compose.prod.yml  : legacy full-stack pre-split
#
# Usage:
#   bash deploy/deploy.sh vps      # runs this file
#   ssh root@VPS 'cd /opt/iams/deploy && docker compose -f docker-compose.vps.yml ps'

services:
  # ── Database (faculty + schedules + rooms + settings only) ──────────

  postgres:
    image: postgres:16-alpine
    container_name: iams-postgres-vps
    environment:
      TZ: Asia/Manila
      POSTGRES_DB: iams
      POSTGRES_USER: iams
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iams_vps_password}
    volumes:
      # Dedicated volume so a rollback to docker-compose.prod.yml (legacy)
      # doesn't clobber the VPS-only data and vice-versa.
      - postgres_data_vps:/var/lib/postgresql/data
    ports:
      # Loopback only. Reachable via `docker exec` for psql debugging.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iams -d iams"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Media Relay (accepts push from on-prem Mac, serves public WebRTC) ──

  mediamtx:
    image: bluenviron/mediamtx:1.11.3
    container_name: iams-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.relay.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"      # RTSP ingest from on-prem Mac's runOnReady push
      - "8887:8887/udp"  # WebRTC media UDP
      - "8889:8889"      # WHEP — consumed by the Faculty APK's live feed
    deploy:
      resources:
        limits:
          memory: 256M

  # ── TURN (WebRTC NAT traversal for off-campus faculty on cellular) ─────

  coturn:
    image: coturn/coturn:4.6.2-r1
    container_name: iams-coturn
    restart: unless-stopped
    command:
      - "-n"
      - "--realm=iams"
      - "--fingerprint"
      - "--listening-port=3478"
      - "--min-port=49152"
      - "--max-port=49252"
      - "--user=iams:iams-turn-secret-2026"
      - "--lt-cred-mech"
      - "--no-tls"
      - "--no-dtls"
      - "--log-file=stdout"
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49252:49152-49252/udp"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Thin API (auth + users + schedules + rooms + health) ───────────────

  api-gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iams-api-gateway-vps
    env_file:
      - ../backend/.env.vps
    environment:
      - TZ=Asia/Manila
      - SERVICE_ROLE=api-gateway
      # Credentials must match the postgres service above. Overriding here
      # so a mismatched .env.vps doesn't silently break auth.
      - DATABASE_URL=postgresql://iams:${POSTGRES_PASSWORD:-iams_vps_password}@postgres:5432/iams
      # Heavy features off — the Settings model reads these from the env.
      # Setting them here (instead of only in .env.vps) makes the compose
      # file self-documenting and prevents a misconfigured .env.vps from
      # silently enabling ML on the public surface.
      - ENABLE_ML=false
      - ENABLE_REDIS=false
      - ENABLE_FRAME_GRABBERS=false
      - ENABLE_BACKGROUND_JOBS=false
      - ENABLE_FACE_ROUTES=false
      - ENABLE_ATTENDANCE_ROUTES=false
      - ENABLE_PRESENCE_ROUTES=false
      - ENABLE_ANALYTICS_ROUTES=false
      - ENABLE_NOTIFICATION_ROUTES=false
      - ENABLE_AUDIT_ROUTES=false
      - ENABLE_EDGE_ROUTES=false
      - ENABLE_SETTINGS_ROUTES=false
      - ENABLE_WS_ROUTES=false
      # Sync receiver — accepts faculty/schedule/room/faculty_record
      # snapshots from the on-prem Mac. Required for the off-campus
      # faculty APK to see schedule changes without manual re-deploys.
      - ENABLE_SYNC_RECEIVER_ROUTES=true
      # Shared secret for the X-Sync-Secret header. Propagated from the
      # operator's local scripts/.env.local by deploy/deploy.sh — never
      # baked into backend/.env.vps so the secret never sits at rest on
      # the VPS filesystem.
      - VPS_SYNC_SECRET=${VPS_SYNC_SECRET:-}
    ports:
      # Loopback-only; nginx proxies it from :80. Faculty APK hits nginx.
      - "127.0.0.1:8000:8000"
    healthcheck:
      # The health endpoint returns 200 when DB is healthy; Redis / FAISS
      # /mediamtx are marked "disabled" so VPS ≠ unhealthy.
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # No ML → 512 MB is plenty. FastAPI + SQLAlchemy + auth = tiny.
          memory: 512M

  # ── Reverse proxy: serves /iams.apk + /health + /api + /.well-known ────

  nginx:
    image: nginx:alpine
    container_name: iams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.vps.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/static:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      mediamtx:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Log viewer ─────────────────────────────────────────────────────────

  dozzle:
    image: amir20/dozzle:latest
    container_name: iams-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data_vps:
  certbot_certs:
  certbot_www:
