# IAMS Onprem Nginx — serves admin portal static build AND proxies API + WS + WHEP
#
# Runs inside docker-compose.onprem.yml, container iams-nginx-onprem, port 80.
# Upstream hostnames (api-gateway, mediamtx) resolve via the Docker network.
#
# Dynamic DNS re-resolution (observed 2026-04-24): nginx's classic
# `upstream { server api-gateway:8000; }` block resolves DNS once at
# worker start. When api-gateway restarts (docker compose restart, image
# rebuild, image-based deploy) it gets a new container IP — but nginx
# keeps forwarding to the dead one until nginx itself is restarted,
# which surfaces as a 502 Bad Gateway in the admin portal. The fix is to
# use a variable inside `proxy_pass` (which forces nginx to re-resolve
# via the resolver on every request, bound by the resolver's `valid`
# TTL), plus a `resolver` pointed at Docker's internal DNS at 127.0.0.11.
# The `upstream` blocks are therefore NOT used — they'd re-introduce the
# caching bug. Kept below as inert documentation of the intended topology.

# Rate limit for /api
limit_req_zone $binary_remote_addr zone=onprem_api:10m rate=60r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Docker embedded DNS. `valid=10s` caps how long a resolved IP is
    # cached in-process; api-gateway restarts are detected within 10 s.
    # ipv6=off matches our docker networks (IPv4-only) and avoids a
    # pointless AAAA lookup on every re-resolve.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Upstream addresses held in variables so proxy_pass re-resolves via
    # the resolver above on every request instead of caching at worker
    # start. See the top-of-file note for why this matters.
    set $upstream_api      "api-gateway:8000";
    set $upstream_mediamtx "mediamtx:8889";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 5-face multipart registration can exceed 25 MB.
    client_max_body_size 50M;
    large_client_header_buffers 8 64k;

    # ── WebSocket endpoints (must precede /api/) ────────────────────────

    location /api/v1/ws/attendance/ {
        proxy_pass http://$upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/v1/ws/alerts/ {
        proxy_pass http://$upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Catch-all for future /api/v1/ws/... paths.
    location /api/v1/ws/ {
        proxy_pass http://$upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API ────────────────────────────────────────────────────────

    location /api/ {
        limit_req zone=onprem_api burst=100 nodelay;

        proxy_pass http://$upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Face-recognition endpoints can take a few seconds.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebRTC WHEP passthrough to local mediamtx ───────────────────────
    # Admin portal opens /whep/{stream_key}/whep for the SDP exchange.
    # We strip the leading /whep/ prefix so mediamtx sees /{stream_key}/whep.
    location /whep/ {
        rewrite ^/whep/(.*)$ /$1 break;
        # Forward the rewritten $uri (without the /whep/ prefix) + any
        # query string. Variable-based proxy_pass requires explicit URI.
        proxy_pass http://$upstream_mediamtx$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WHEP is a simple HTTP POST/DELETE for SDP; the actual WebRTC media
        # flows peer-to-peer over ICE candidates (UDP 8887 on the Mac).
        # Short timeout is fine — the SDP exchange completes in <1 s.
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # CORS — the admin portal is served from the same origin (this nginx),
        # so this is mostly defensive for future cross-origin scenarios.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            return 204;
        }
    }

    # ── Admin Portal (SPA — client-side routing) ────────────────────────
    # Note: no /iams.apk route here. The on-prem stack does not distribute
    # APKs (install via `./gradlew installDebug`). The VPS relay nginx
    # (deploy/nginx.relay.conf) is where APK distribution lives.
    # Admin build lands in /usr/share/nginx/html/admin via the admin_dist
    # named volume (built by the admin-build sidecar).
    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }
}
