# IAMS VPS Relay Nginx — public-facing, no backend to proxy.
#
# Post local-compute split, the VPS no longer runs the api-gateway.
# This nginx just serves:
#   - /iams.apk       (Android APK download)
#   - /health         (simple healthcheck)
#   - /.well-known/   (Let's Encrypt challenge)
#   - /               (tiny placeholder telling people where to find the admin)
#
# Note: WebRTC WHEP traffic goes directly to mediamtx on port 8889,
# NOT through nginx. This config is intentionally minimal.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Let's Encrypt challenge (when SSL gets set up later)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Android APK download
    location = /iams.apk {
        alias /static/iams.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="iams.apk"';
    }

    # Simple healthcheck — useful for external monitoring.
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Anyone hitting the root gets a short explainer so they don't panic
    # about the 404s they'd see from the old /api/ paths.
    location = / {
        return 200 "IAMS public stream relay.\n\nThis host now serves only the public video stream.\nFor attendance management, use the school LAN admin portal.\nFor the Android APK: /iams.apk\n";
        add_header Content-Type text/plain;
    }

    # Everything else is gone (no backend). Return 410 Gone so callers
    # know to update their configs, not just retry a 404.
    location /api/ {
        return 410 "The IAMS API has moved off this VPS — it now runs on the school's on-prem Mac. Update your client config.\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
