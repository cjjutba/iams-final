# IAMS Nginx Reverse Proxy Configuration
# Handles HTTP → HTTPS redirect, SSL termination, WebSocket proxying

# Rate limiting zone (prevent abuse)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Upstream backend
upstream iams_backend {
    ip_hash;  # Sticky sessions for WebSocket (each worker has its own connection manager)
    server backend:8000;
}

# HTTP → HTTPS redirect (uncomment after SSL is set up)
# server {
#     listen 80;
