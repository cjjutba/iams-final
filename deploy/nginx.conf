# IAMS Nginx Reverse Proxy Configuration
# Handles HTTP → HTTPS redirect, SSL termination, WebSocket proxying

# Rate limiting zone (prevent abuse)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Upstream — points to the api-gateway container (multi-container architecture)
upstream iams_backend {
    server api-gateway:8000;
}

# Connection upgrade map for WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect (uncomment after SSL is set up)
# server {
#     listen 80;
#     server_name your-domain.com;
#
#     # Let's Encrypt challenge
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# Main server (HTTP for now, switch to HTTPS after certbot)
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Max upload size (face images — 5 high-res photos can exceed 25MB)
    client_max_body_size 50M;

    # Larger request-URI buffer. The PDF export passes every selected
    # schedule UUID in the query string — with ~300 schedules the URL
    # exceeds nginx's default 8KB and nginx returns 414 before the
    # request ever reaches the backend.
    large_client_header_buffers 8 64k;

    # ── WebSocket Endpoints ──────────────────────────────────────
    # These must come before the general /api/ block so nginx
    # matches the more-specific prefix first.

    # Attendance updates WebSocket
    location /api/v1/ws/attendance/ {
        proxy_pass http://iams_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Alerts WebSocket
    location /api/v1/ws/alerts/ {
        proxy_pass http://iams_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Catch-all for any other /api/v1/ws/ paths (future-proofing)
    location /api/v1/ws/ {
        proxy_pass http://iams_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API Endpoints ───────────────────────────────────────

    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://iams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML inference (face recognition can take a few seconds)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── APK Download ────────────────────────────────────────────
    location /iams.apk {
        alias /static/iams.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="iams.apk"';
    }

    # ── Root ─────────────────────────────────────────────────────
    # Admin portal is deployed on Vercel (iams-thesis.vercel.app)
    # No static files served from this nginx instance.
    location / {
        proxy_pass http://iams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
