<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your IAMS password</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center" style="padding:48px 24px;">
        <table role="presentation" width="480" cellspacing="0" cellpadding="0">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:40px;">
              <span style="font-size:28px;font-weight:700;color:#1a1a1a;letter-spacing:2px;">IAMS</span>
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="padding-bottom:12px;">
              <h1 style="margin:0;font-size:22px;font-weight:600;color:#1a1a1a;">Reset your password</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-size:15px;line-height:1.6;color:#6b7280;">
                Click the button below to choose a new password.
              </p>
            </td>
          </tr>

          <!-- Button -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;background-color:#1a1a1a;color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;padding:14px 48px;border-radius:8px;">
                Reset Password
              </a>
            </td>
          </tr>

          <!-- Expiry -->
          <tr>
            <td align="center" style="padding-bottom:48px;">
              <p style="margin:0;font-size:13px;color:#9ca3af;">This link expires in 24 hours</p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center">
              <p style="margin:0 0 8px;font-size:13px;color:#9ca3af;">If you didn't request this, ignore this email.</p>
              <p style="margin:0;font-size:12px;color:#d1d5db;">&copy; 2026 IAMS. All rights reserved.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
