# mediamtx LOCAL DEV configuration for IAMS
#
# Mirrors the production Docker setup (deploy/mediamtx.yml):
# - Accepts RTSP push from dev-stream.sh (simulating RPi relay)
# - Serves WebRTC (WHEP) to mobile clients on the same LAN
# - Backend pulls RTSP for face recognition
#
# Differences from production:
# - Binds to 0.0.0.0 so mobile devices on the LAN can reach WebRTC
# - No TURN server (LAN doesn't need NAT traversal)
# - No ICE additionalHosts (LAN IP is directly reachable)

logLevel: info

# Authentication: allow anything locally (same as production)
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
      - action: api
      - action: metrics
      - action: pprof

# REST API — used by FastAPI backend to manage paths
api: yes
apiAddress: 0.0.0.0:9997

# RTSP — accepts push from dev-stream.sh (simulating RPi relay)
rtsp: yes
rtspAddress: 0.0.0.0:8554

# WebRTC (WHEP) — mobile clients connect here via FastAPI proxy
# Bind to all interfaces so phones on the same WiFi can reach it
webrtc: yes
webrtcAddress: 0.0.0.0:8889
webrtcLocalUDPAddress: 0.0.0.0:8887
# Force ICE candidates to use the LAN IP so mobile devices can connect.
# Update this if your Mac's WiFi IP changes (run: ipconfig getifaddr en0).
webrtcICEHostNAT1To1IPs:
  - 192.168.88.254

# Disable unused protocols
hls: no
srt: no
rtmp: no

# Write queue size: how many frames mediamtx buffers per reader before dropping.
# 8 was too aggressive for the main stream (2560x1920@20fps, ~10Mbps) — caused
# "reader is too slow, discarding N frames" errors and ~0.5fps playback.
# 512 gives readers enough runway to absorb WiFi jitter bursts.
writeQueueSize: 512

# Camera proxy paths — MediaMTX pulls RTSP from cameras and re-serves
# Add your room's stream_key here with the camera's RTSP URL as source
paths:
  # Capstone Project Laboratory (Reolink EB 226)
  # Main stream (2560x1920@20fps) — used by backend FrameGrabber for face recognition
  capstone-lab:
    source: rtsp://admin:%40Iams2026THESIS%21@192.168.88.10:554/h264Preview_01_main
    rtspTransport: tcp
    sourceOnDemand: yes

  # Sub stream (640x480 or 896x512) — used by phone for smooth playback
  capstone-lab-view:
    source: rtsp://admin:%40Iams2026THESIS%21@192.168.88.10:554/h264Preview_01_sub
    rtspTransport: tcp
    sourceOnDemand: yes

  all_others:
    overridePublisher: yes
