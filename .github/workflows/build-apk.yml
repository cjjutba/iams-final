name: Build & Release APK

# Builds the Android app and publishes a signed APK as a GitHub Release on every
# push to main. The Vercel landing page rewrites /iams.apk to the latest release
# asset (see admin/vercel.json), so users always download the freshest build.
#
# Requires four repository secrets (Settings → Secrets and variables → Actions):
#   - SIGNING_KEYSTORE_BASE64   base64-encoded contents of the .jks keystore
#   - SIGNING_KEYSTORE_PASSWORD store password used when generating the keystore
#   - SIGNING_KEY_ALIAS         key alias inside the keystore
#   - SIGNING_KEY_PASSWORD      key password (often same as store password)

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

# Avoid two builds racing to publish the same release tag if commits land quickly.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout (full history for version count)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify signing secrets are present
        run: |
          missing=()
          [ -z "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]   && missing+=("SIGNING_KEYSTORE_BASE64")
          [ -z "${{ secrets.SIGNING_KEYSTORE_PASSWORD }}" ] && missing+=("SIGNING_KEYSTORE_PASSWORD")
          [ -z "${{ secrets.SIGNING_KEY_ALIAS }}" ]         && missing+=("SIGNING_KEY_ALIAS")
          [ -z "${{ secrets.SIGNING_KEY_PASSWORD }}" ]      && missing+=("SIGNING_KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            echo "::error::See android/SIGNING.md for keystore generation steps."
            exit 1
          fi
          echo "All four signing secrets are configured."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Compute version (versionCode = total commits)
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          VERSION_NAME="1.0.${COUNT}"
          TAG="v${VERSION_NAME}"
          echo "versionCode=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "versionName=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "  versionCode = ${COUNT}"
          echo "  versionName = ${VERSION_NAME}"
          echo "  tag         = ${TAG}"
          echo "  sha         = ${SHA}"

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "${RUNNER_TEMP}/release.keystore"
          if [ ! -s "${RUNNER_TEMP}/release.keystore" ]; then
            echo "::error::Decoded keystore is empty — check SIGNING_KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "IAMS_KEYSTORE_PATH=${RUNNER_TEMP}/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: android
        env:
          IAMS_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          IAMS_KEY_ALIAS:         ${{ secrets.SIGNING_KEY_ALIAS }}
          IAMS_KEY_PASSWORD:      ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            -PversionCode=${{ steps.version.outputs.versionCode }} \
            -PversionName=${{ steps.version.outputs.versionName }} \
            --no-daemon --stacktrace

      - name: Stage APK as iams.apk
        run: |
          mkdir -p release
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected APK not found at $SRC"
            ls -la android/app/build/outputs/apk/release/ || true
            exit 1
          fi
          cp "$SRC" release/iams.apk
          ls -lh release/iams.apk
          SIZE=$(stat -c%s release/iams.apk)
          echo "  size = ${SIZE} bytes ($((SIZE / 1024 / 1024)) MiB)"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)"
          "$BUILD_TOOLS/apksigner" verify --verbose release/iams.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: IAMS ${{ steps.version.outputs.versionName }}
          body: |
            Automated build from commit `${{ steps.version.outputs.sha }}`.

            **Install:** download `iams.apk` and sideload on Android 8.0+ (arm64-v8a only).

            Backend endpoint baked in: `http://167.71.217.44`

            ---
            *This release was built and signed by GitHub Actions. The Vercel landing
            page (`iams-thesis.vercel.app`) always serves the latest release via the
            `/iams.apk` rewrite — no manual deploy required.*
          files: release/iams.apk
          fail_on_unmatched_files: true
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f "${RUNNER_TEMP}/release.keystore" || true
